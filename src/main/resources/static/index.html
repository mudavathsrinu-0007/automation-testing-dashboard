<!DOCTYPE html>
<html>
<head>
    <title>Automation Test Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .cards {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 25%;
            text-align: center;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        .pass { border-top: 5px solid green; }
        .fail { border-top: 5px solid red; }

        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 15px;
            background: black;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 20px;
        }

        th {
            background: black;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        .status-pass {
            color: green;
            font-weight: bold;
        }

        .status-fail {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>Automation Test Dashboard</h1>

<div class="top-bar">
    <button onclick="loadData()">Refresh Results</button>
</div>

<div class="cards">
    <div class="card">
        <h3>Total Tests</h3>
        <h2 id="total">0</h2>
    </div>

    <div class="card pass">
        <h3>Passed</h3>
        <h2 id="passed">0</h2>
    </div>

    <div class="card fail">
        <h3>Failed</h3>
        <h2 id="failed">0</h2>
    </div>
</div>

<h2>Test Results</h2>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Test Name</th>
        <th>Status</th>
        <th>Execution Time (ms)</th>
    </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>
    function loadData() {
        fetch('/api/test-results')
            .then(response => response.json())
            .then(data => {

                let total = data.length;
                let pass = data.filter(r => r.status === "PASS").length;
                let fail = data.filter(r => r.status === "FAIL").length;

                document.getElementById("total").innerText = total;
                document.getElementById("passed").innerText = pass;
                document.getElementById("failed").innerText = fail;

                let table = "";

                data.forEach(r => {
                    let statusClass = r.status === "PASS" ? "status-pass" : "status-fail";

                    table += `
                        <tr>
                            <td>${r.id}</td>
                            <td>${r.testName}</td>
                            <td class="${statusClass}">${r.status}</td>
                            <td>${r.executionTime}</td>
                        </tr>
                    `;
                });

                document.getElementById("tableBody").innerHTML = table;
            })
            .catch(error => {
                console.error("Error loading dashboard data:", error);
            });
    }

    loadData();
</script>

</body>
</html>
